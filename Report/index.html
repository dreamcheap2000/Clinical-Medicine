<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clinical Exam Report System</title>
  <link rel="stylesheet" href="style.css">
  <!-- Chart.js for statistics dashboard -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body>
  <div id="app">

    <!-- Navigation bar -->
    <nav id="navbar">
      <span class="brand">🏥 Clinical Reports</span>
      <div id="nav-links">
        <!-- Populated by app.js -->
      </div>
    </nav>

    <!-- Main content — swapped by the router -->
    <main id="main-content" role="main">
      <p style="padding:2rem;color:#888">Loading…</p>
    </main>

    <!-- Toast notifications -->
    <div id="toast-container" aria-live="polite"></div>

  </div>

  <!-- Load as ES module so we can use import/export across files -->
  <script type="module" src="app.js"></script>
</body>
</html>

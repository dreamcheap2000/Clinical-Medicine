name: Convert EBM Notes to Patient Education Articles

on:
  push:
    branches:
      - main
    paths:
      - 'PHCEP/data/ebm/pending_conversions.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convert-ebm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openai

      - name: Convert EBM notes to patient education entries
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 .github/scripts/convert_ebm_to_edu.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PHCEP/data/edu/patient_edu_data.json PHCEP/data/ebm/pending_conversions.json
          git diff --staged --quiet || git commit -m "chore: auto-convert EBM notes to patient education articles [skip ci]"
          git pull --rebase origin main
          git push
